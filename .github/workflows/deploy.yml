name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13

      - name: Install Zen Kaku Gothic New font
        run: |
          mkdir -p ~/.local/share/fonts
          BASE_URL="https://github.com/google/fonts/raw/main/ofl/zenkakugothicnew"
          curl -L "${BASE_URL}/ZenKakuGothicNew-Regular.ttf" -o ~/.local/share/fonts/ZenKakuGothicNew-Regular.ttf
          curl -L "${BASE_URL}/ZenKakuGothicNew-Bold.ttf" -o ~/.local/share/fonts/ZenKakuGothicNew-Bold.ttf
          fc-cache -f

      - run: uv sync --locked

      - run: uv run make -C docs revealjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/revealjs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
